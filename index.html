<!DOCTYPE html><html lang="zh-CN"><head>
<meta property="og:title" content="Http Tester — DevKit">
<meta property="og:description" content="Free online Http Tester tool — fast, simple, and no signup required.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://479464887-rgb.github.io/http-tester/">
<meta name="twitter:card" content="summary">
<link rel="canonical" href="https://479464887-rgb.github.io/http-tester/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠</text></svg>">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="HTTP Tester - HTTP请求测试工具"><meta property="og:title" content="HTTP Tester"><title>HTTP Tester</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}header h1{font-size:20px;color:#58a6ff}.lang-switch{display:flex;gap:4px}.lang-switch button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}.lang-switch button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}.container{max-width:1000px;margin:0 auto;padding:24px}.request-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}.request-bar select{background:#0d1117;color:#58a6ff;border:1px solid #30363d;padding:8px 12px;border-radius:6px;font-size:14px;font-weight:600}.request-bar input[type=text]{flex:1;min-width:200px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;font-size:14px;font-family:monospace}.request-bar input:focus{outline:none;border-color:#58a6ff}.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}.btn:hover{background:#30363d}.btn-primary{background:#238636;border-color:#238636;color:#fff}.btn-primary:hover{background:#2ea043}.tabs{display:flex;gap:0;margin-bottom:0}.tabs button{background:#21262d;color:#8b949e;border:1px solid #30363d;border-bottom:none;padding:8px 16px;cursor:pointer;font-size:13px;border-radius:8px 8px 0 0}.tabs button.active{background:#161b22;color:#c9d1d9;border-color:#30363d}.panel{background:#161b22;border:1px solid #30363d;border-radius:0 8px 8px 8px;overflow:hidden;margin-bottom:16px}.panel textarea{width:100%;height:200px;background:#0d1117;color:#c9d1d9;border:none;padding:12px;font-family:monospace;font-size:13px;resize:vertical}.panel textarea:focus{outline:none}.panel-header{background:#21262d;padding:8px 16px;font-size:12px;font-weight:500;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;color:#8b949e}.response-panel{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}.response-header{background:#21262d;padding:10px 16px;font-size:13px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center}.response-body{background:#0d1117;padding:12px;font-family:monospace;font-size:12px;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}.status-2xx{background:rgba(35,134,54,.2);color:#3fb950}.status-4xx{background:rgba(210,153,34,.2);color:#d29922}.status-5xx{background:rgba(218,54,51,.2);color:#f85149}.loading{padding:24px;text-align:center;color:#8b949e}</style></head><body><header><h1>🌐 HTTP Tester</h1><div class="lang-switch"><button class="active" onclick="setLang('zh')">中文</button><button onclick="setLang('en')">EN</button></div></header><div class="container"><div class="request-bar"><select id="method"><option>GET</option><option>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option><option>HEAD</option><option>OPTIONS</option></select><input type="text" id="url" placeholder="https://jsonplaceholder.typicode.com/posts/1" onkeydown="if(event.key==='Enter')sendRequest()"><button class="btn btn-primary" onclick="sendRequest()">🚀 发送</button></div><div class="tabs"><button class="active" onclick="switchTab('headers')">Headers</button><button onclick="switchTab('body')">Body</button></div><div class="panel" id="tab-headers"><div class="panel-header">请求头 (每行一个, 格式: Key: Value)</div><textarea id="headers" placeholder="Content-Type: application/json&#10;Authorization: Bearer token123"></textarea></div><div class="panel" id="tab-body" style="display:none"><div class="panel-header">请求体</div><textarea id="requestBody" placeholder='{"title":"foo","body":"bar","userId":1}'></textarea></div><div id="response"></div></div><script>let lang='zh';let activeTab='headers';function setLang(l){lang=l;document.querySelectorAll('.lang-switch button').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='zh')||(i===1&&l==='en')))}function switchTab(t){activeTab=t;document.getElementById('tab-headers').style.display=t==='headers'?'block':'none';document.getElementById('tab-body').style.display=t==='body'?'block':'none';document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',(b.textContent.toLowerCase().includes(t))))}async function sendRequest(){const method=document.getElementById('method').value;const url=document.getElementById('url').value.trim();if(!url){alert('请输入URL');return}document.getElementById('response').innerHTML='<div class="loading">⏳ 发送请求中...</div>';const startTime=Date.now();try{const opts={method};const headers={};document.getElementById('headers').value.split('\n').forEach(line=>{const ci=line.indexOf(':');if(ci>0)headers[line.substring(0,ci).trim()]=line.substring(ci+1).trim()});if(Object.keys(headers).length>0)opts.headers=headers;if(['POST','PUT','PATCH'].includes(method))opts.body=document.getElementById('requestBody').value;const resp=await fetch(url,opts);const elapsed=Date.now()-startTime;const body=await resp.text();let statusClass='';if(resp.status<300)statusClass='status-2xx';else if(resp.status<500)statusClass='status-4xx';else statusClass='status-5xx';let respHeaders='';resp.headers.forEach((v,k)=>respHeaders+=k+': '+v+'\n');let formattedBody=body;try{formattedBody=JSON.stringify(JSON.parse(body),null,2)}catch(e){}document.getElementById('response').innerHTML='<div class="response-panel"><div class="response-header"><span><span class="status-badge '+statusClass+'">'+resp.status+' '+resp.statusText+'</span> ⏱ '+elapsed+'ms</span><span style="color:#8b949e">'+body.length+' bytes</span></div><div class="panel-header">响应头</div><div class="response-body">'+respHeaders.replace(/</g,'&lt;')+'</div><div class="panel-header">响应体</div><div class="response-body">'+formattedBody.replace(/</g,'&lt;')+'</div></div>'}catch(e){document.getElementById('response').innerHTML='<div class="response-panel"><div class="response-header"><span style="color:#f85149">❌ 请求失败</span></div><div class="response-body">'+e.message+'</div></div>'}}</script></body></html>
